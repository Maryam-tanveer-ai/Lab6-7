<!DOCTYPE html>
<html>
<head>
    <title>Message Repeater</title>
</head>
<body>

<button onclick="repeatMessage()">Start</button>

<p id="output"></p>

<script>
function repeatMessage() {
    let number = Number(prompt("Enter how many times to display the message:"));
    let message = prompt("Enter your message:");

    let result = "";

    for (let i = 1; i <= number; i++) {
        result += message + "<br>";
    }

    document.getElementById("output").innerHTML = result;
}
</script>

</body>
</html>
